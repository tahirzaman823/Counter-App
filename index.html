<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="math-page-container">
        <h1 class="title">Counter App</h1>

        <!-- The Display Unit -->
        <div class="numbers">
            <h2 id="Count" >00</h2>
           
        </div>

        <!-- Controlled Flex Button Row -->
        <div class="buttons">
            <button id="Reset" class="btn-resume">Reset</button>
            
            <button id="Start" class="btn-start">Start</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
